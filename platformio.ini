; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = t-camera-sim
src_dir = src

[env:t-camera-sim]
platform = espressif32@6.3.0
board = esp32s3box
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters = 
	default
	esp32_exception_decoder
	send_on_enter
build_flags = 
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DCORE_DEBUG_LEVEL=2
	-DBOARD_HAS_PSRAM
	-DCAMERA_MODEL_TTGO_T_CAM_SIM
	-DMQTT_MAX_PACKET_SIZE=1024
lib_deps = 
	adafruit/RTClib
	adafruit/Adafruit MCP23017 Arduino Library@^2.2.0
	arduino-libraries/Stepper@^1.1.3
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.0.4
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/Adafruit BME680 Library@^2.0.5
	https://github.com/Xinyuan-LilyGO/LilyGo-Modem-Series.git
	https://github.com/lewisxhe/TinyGSM.git#master
	vshymanskyy/StreamDebugger@^1.0.1
	mobizt/ESP Mail Client@^3.4.24
lib_ignore = 
	TFT_eSPI
board_build.partitions = default_16MB.csv
